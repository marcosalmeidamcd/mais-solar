<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="18" fill="#1a7ab8"/>

  <!-- MAIS text -->
  <text x="100" y="64" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" letter-spacing="2">MAIS</text>

  <!-- SOLAR text -->
  <text x="100" y="112" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="46" fill="white" text-anchor="middle" letter-spacing="2">SOLAR</text>

  <!-- Sun rays -->
  <g transform="translate(100, 155)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="7" fill="#F5A623"/>
    <!-- Rays -->
    <line x1="0" y1="-14" x2="0" y2="-20" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="0" y2="20" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="0" x2="-20" y2="0" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="20" y2="0" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="-14" y2="-14" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="14" y2="-14" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="10" x2="-14" y2="14" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="14" y2="14" stroke="#F5A623" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- House icon -->
  <g transform="translate(72, 126)">
    <!-- Roof -->
    <polygon points="28,-14 0,8 56,8" fill="white"/>
    <!-- Body -->
    <rect x="8" y="8" width="40" height="28" rx="2" fill="white"/>
    <!-- Door -->
    <rect x="20" y="20" width="16" height="16" rx="2" fill="#1a7ab8"/>
  </g>
</svg>
